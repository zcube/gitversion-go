name: Release Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --title "v${VERSION}"
