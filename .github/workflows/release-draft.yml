name: Release Draft

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # dogfooding: 빌드한 gitversion-go 로 자신의 버전을 계산해 로그로 확인한다.
      - name: Compute version with gitversion-go (dogfood)
        run: |
          go build -o /tmp/gitversion-go ./cmd/gitversion-go
          /tmp/gitversion-go -v FullSemVer || true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
